<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Secure Voting DApp on Polygon network" />
  <title>Secure Voting DApp (Polygon)</title>
  <!-- Web3.js dependency -->
  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js" defer></script>

  <!-- project styles (external) -->
  <link rel="stylesheet" href="css/style.css" />

</head>

<body>
  <main id="container">
    <h1>Secure Voting DApp</h1>

    <button id="connectBtn">🔗 Connect Wallet</button>
    <p id="wallet">Not connected</p>

    <hr />

    <section id="adminSection">
      <h2>Admin: Register Voter</h2>
      <input id="voterAddress" type="text" placeholder="Enter voter wallet address" />
      <button id="registerBtn">Register Voter</button>
    </section>

    <hr />

    <section id="candidatesSection">
      <h2>Candidates</h2>
      <div id="candidateList">Loading...</div>
    </section>

    <hr />

    <section id="resultsSection">
      <h2>Results</h2>
      <div id="results">No results yet.</div>
    </section>
  </main>

  <!-- project script -->
  <script src="js/app.js" defer></script>
</body>

</html>
